# ─────────────────────────────────────────────────────────────────────────────
# Workflows
#
#  ┌─ PR opened / pushed ─────────────────────────────────────────────────┐
#  │  pr-plan: plan-dev ─┐                                                │
#  │           plan-prod ─┤──► post-pr-comment (PR comment with diffs)   │
#  │           plan-central ┘                                             │
#  └──────────────────────────────────────────────────────────────────────┘
#
#  ┌─ Merged to main ─────────────────────────────────────────────────────┐
#  │  main-apply:                                                          │
#  │    apply-dev (auto) ───────────────────────────────────────────────  │
#  │    plan-prod-apply ──► hold-prod ──────────► apply-prod (approval)  │
#  │    plan-central-apply ──► hold-central ────► apply-central (approv) │
#  └──────────────────────────────────────────────────────────────────────┘
#
#  ┌─ Manual dispatch via API or UI ──────────────────────────────────────┐
#  │  apply-dev:     plan-dev-apply ──► hold-dev ──► apply-dev          │
#  │  apply-prod:    plan-prod-apply ──► hold-prod ──► apply-prod       │
#  │  apply-central: plan-central-apply ──► hold-central ──► apply-cen  │
#  └──────────────────────────────────────────────────────────────────────┘
# ─────────────────────────────────────────────────────────────────────────────
workflows:

  # ── PR Plan ────────────────────────────────────────────────────────────────
  # Runs on every push to a non-main branch. If $CIRCLE_PULL_REQUEST is set,
  # the results are posted as a PR comment; otherwise they're visible in the
  # CircleCI UI only (useful for draft / pre-PR work).
  pr-plan:
    when:
      and:
        - equal: ["", << pipeline.parameters.apply-environment >>]
        - not:
            equal: ["main", << pipeline.git.branch >>]
    jobs:
      - plan-dev:
          context: terraform
      - plan-prod:
          context: terraform
      - plan-central:
          context: terraform
      - post-pr-comment:
          context: terraform
          requires:
            - plan-dev
            - plan-prod
            - plan-central

  # ── Apply on merge to main ─────────────────────────────────────────────────
  # Dev applies automatically on merge to main (plan + apply, no gate).
  # Prod and central require a human to click "Approve" in the CircleCI UI.
  main-apply:
    when:
      and:
        - equal: ["", << pipeline.parameters.apply-environment >>]
        - equal: ["main", << pipeline.git.branch >>]
    jobs:
      - apply-dev:
          context: terraform
      - plan-prod-apply:
          context: terraform
      - hold-prod:
          type: approval
          requires:
            - plan-prod-apply
      - apply-prod:
          # Slack context provides SLACK_ACCESS_TOKEN for the release-notes orb
          context: [terraform, Slack]
          requires:
            - hold-prod
      - plan-central-apply:
          context: terraform
      - hold-central:
          type: approval
          requires:
            - plan-central-apply
      - apply-central:
          context: terraform
          requires:
            - hold-central

  # ── Apply: dev ────────────────────────────────────────────────────────────
  apply-dev:
    when:
      equal: ["dev", << pipeline.parameters.apply-environment >>]
    jobs:
      - plan-dev-apply:
          context: terraform
      - hold-dev:
          type: approval
          requires:
            - plan-dev-apply
      - apply-dev:
          context: terraform
          requires:
            - hold-dev

  # ── Apply: prod ───────────────────────────────────────────────────────────
  apply-prod:
    when:
      equal: ["prod", << pipeline.parameters.apply-environment >>]
    jobs:
      - plan-prod-apply:
          context: terraform
      - hold-prod:
          type: approval
          requires:
            - plan-prod-apply
      - apply-prod:
          # Slack context provides SLACK_ACCESS_TOKEN for the release-notes orb
          context: [terraform, Slack]
          requires:
            - hold-prod

  # ── Apply: central ────────────────────────────────────────────────────────
  apply-central:
    when:
      equal: ["central", << pipeline.parameters.apply-environment >>]
    jobs:
      - plan-central-apply:
          context: terraform
      - hold-central:
          type: approval
          requires:
            - plan-central-apply
      - apply-central:
          context: terraform
          requires:
            - hold-central
