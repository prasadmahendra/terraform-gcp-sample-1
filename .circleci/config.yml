      - run:
          name: Install gke-gcloud-auth-plugin
          command: apt-get update -qq && apt-get install -y google-cloud-cli-gke-gcloud-auth-plugin
      - run:
          name: Authenticate to GKE clusters (prod)
          command: |
            gcloud container clusters get-credentials gke-default \
              --region "$GCP_REGION" --project "$GCP_PROJECT_ID"
            gcloud container clusters get-credentials gke-dws-primary-region \
              --region "$GCP_REGION" --project "$GCP_PROJECT_ID"
            gcloud container clusters get-credentials gke-us-west1 \
              --region us-west1 --project "$GCP_PROJECT_ID"
      - setup-aws-prod
      - build-secrets-tfvars:
          working-dir: ~/repo/environments/prod
      - run:
          name: Terraform Init (prod)
          working_directory: ~/repo/deployment
          command: |
            export TF_DATA_DIR="../environments/prod/.terraform"
            terraform init -backend-config=../environments/prod/backend.tfvars
      - build-tf-targets
      - run:
          name: Terraform Plan (prod) — fresh plan after approval
          working_directory: ~/repo/deployment
          command: |
            export TF_DATA_DIR="../environments/prod/.terraform"
            terraform plan \
              "${TF_TARGETS_ARGS[@]}" \
              -var-file=../environments/prod/terraform.tfvars \
              -var-file=../environments/prod/secrets.tfvars \
              -no-color \
              -lock-timeout=5m \
              -refresh=<< pipeline.parameters.refresh >> \
              -out=tfplan-prod 2>&1 | tee plan-output.txt
      - run:
          name: Terraform Apply (prod)
          working_directory: ~/repo/deployment
          command: |
            if [ "<< pipeline.parameters.dry-run-only >>" = "true" ]; then
              echo "dry-run-only=true — skipping apply"
              exit 0
            fi
            export TF_DATA_DIR="../environments/prod/.terraform"
            terraform apply \
              -no-color \
              -lock-timeout=5m \
              tfplan-prod 2>&1 | tee apply-output.txt
      - store_artifacts:
          path: ~/repo/deployment/plan-output.txt
          destination: apply-prod/plan-output.txt
      - store_artifacts:
          path: ~/repo/deployment/apply-output.txt
          destination: apply-prod/apply-output.txt

      # ── Release notes → Slack + record deployed SHA ─────────────────────────
      # These run only on a successful apply, and are skipped on dry-run.
      #
      # Order matters: we print the notes and record the deployed SHA *before*
      # posting to Slack, so neither depends on Slack being configured. Slack
      # posting is handled by the circleci/slack orb, which needs these in the
      # "terraform" context:
      #   SLACK_ACCESS_TOKEN  — bot token with chat:write (orb requirement)
      #   SLACK_ONCALL        — rotating on-call mention, e.g.
      #                         "<!subteam^S0XXXXXXX|backend-oncall>" (optional)
      # Until SLACK_ACCESS_TOKEN is set we halt before the orb (the orb hard-
      # fails on a missing token), so the job stays green and the rendered
      # notes are still available in the "Build…" step log to copy by hand.
      - when:
          condition:
            not: << pipeline.parameters.dry-run-only >>
          steps:
            - run:
                name: Build prod deploy release notes
                working_directory: ~/repo
                command: |
                  # Ensure enough history to diff against the previously deployed SHA.
                  git fetch --unshallow 2>/dev/null || git fetch --depth=500 2>/dev/null || true
                  export CURRENT_SHA="$CIRCLE_SHA1"
                  PREV_SHA=$(gsutil cat gs://spiffy-tfstate-prod/deployed/prod-sha.txt 2>/dev/null || echo "")
                  export PREV_SHA
                  PLAN_SUMMARY=$(grep -E "Plan:|No changes\." deployment/plan-output.txt 2>/dev/null | tail -1)
                  export PLAN_SUMMARY
                  # Renders the message and exports $SLACK_RELEASE_NOTES via $BASH_ENV.
                  python3 .circleci/scripts/prod_release_notes.py
            - run:
                name: Record deployed SHA marker
                command: |
                  echo "$CIRCLE_SHA1" | gsutil cp - gs://spiffy-tfstate-prod/deployed/prod-sha.txt
                  echo "Recorded prod deployed SHA: $CIRCLE_SHA1"
            - run:
                name: Skip Slack if no bot token configured
                command: |
                  if [ -z "${SLACK_ACCESS_TOKEN:-}" ]; then
                    echo "SLACK_ACCESS_TOKEN not set — release notes are printed above; skipping Slack post."
                    circleci step halt
                  fi
            - slack/notify:
                channel: "#prod-changes"
                event: pass
                custom: |
                  {
                    "blocks": [
                      {
                        "type": "section",
                        "text": { "type": "mrkdwn", "text": "$SLACK_RELEASE_NOTES" }
                      }
                    ]
                  }

