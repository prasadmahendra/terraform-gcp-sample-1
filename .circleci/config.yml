  # ═══════════════════════════════════════════════════════════════════════════
  # Apply: deployment/prod
  # Runs after manual approval in the CircleCI UI.
  # Re-plans before applying to guard against state drift during the approval
  # window (same pattern as the GitHub Actions workflow).
  # ═══════════════════════════════════════════════════════════════════════════
  apply-prod:
    executor: tf-gcloud
    environment:
      GCP_PROJECT_ID: spiffy-prod
      GCP_REGION: us-central1
    steps:
      - checkout
      - install-terraform
      - auth-gcp:
